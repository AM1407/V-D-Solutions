services:
    mysql:
        image: 'mysql:8.0'
        ports:
            - '3307:3306'
        environment:
            MYSQL_ROOT_PASSWORD: 'root'
            MYSQL_DATABASE: 'vdsolutions'
        volumes:
            - 'db-data:/var/lib/mysql'
    mailpit:
        image: 'axllent/mailpit'
        ports:
            - '1025:1025' # SMTP
            - '8025:8025' # Web Interface
volumes:
    db-data:
